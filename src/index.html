<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procore PM Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="app">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen">
      <div class="login-container">
        <div class="logo-section">
          <div class="procore-logo-text">PROCORE</div>
          <h2>PM Dashboard</h2>
          <p class="subtitle">Project Manager Portfolio Overview</p>
        </div>
        <button id="btn-login" class="btn-primary btn-large">
          <i class="fas fa-sign-in-alt"></i>
          Connect with Procore
        </button>
      </div>
    </div>

    <!-- MAIN SCREEN -->
    <div id="main-screen" class="screen hidden">

      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <div class="procore-logo-small">PROCORE</div>
          <span class="header-divider"></span>
          <span class="header-title">PM Dashboard</span>
        </div>
        <div class="header-right">
          <button id="btn-refresh" class="btn-icon" title="Refresh Data">
            <i class="fas fa-sync-alt"></i>
          </button>
          <button id="btn-logout" class="btn-icon" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </header>

      <!-- Company Selector -->
      <div class="selector-container">
        <label for="company-select">
          <i class="fas fa-building"></i> Company
        </label>
        <select id="company-select" class="select-procore">
          <option value="">Select a company...</option>
        </select>
      </div>

      <!-- Loading State -->
      <div id="loading-container" class="loading-container hidden">
        <div class="spinner"></div>
        <p id="loading-message">Loading PM Dashboard...</p>
      </div>

      <!-- Dashboard Content -->
      <div id="dashboard-content"></div>

      <!-- Error State -->
      <div id="error-state" class="error-container hidden">
        <i class="fas fa-exclamation-triangle"></i>
        <p id="error-message">An error occurred</p>
        <button id="btn-retry" class="btn-secondary">
          <i class="fas fa-redo"></i> Retry
        </button>
      </div>

    </div>
  </div>

  <script src="js/procore-api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
